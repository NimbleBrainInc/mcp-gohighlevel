name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: uv sync

      - name: Build bundle
        run: |
          uv pip install --target ./deps --only-binary :all: . 2>/dev/null || uv pip install --target ./deps .
          npx @anthropic-ai/mcpb pack .

      - name: Run MTF scanner
        run: |
          uvx mpak-scanner scan *.mcpb --json > scan-raw.json 2>scan-stderr.log || true
          cat scan-stderr.log >&2
          # Scanner prefixes "Scanning *.mcpb..." to stdout — extract JSON starting at first {
          sed -n '/^{/,$p' scan-raw.json > scan-results.json

      - name: Check for critical/high findings
        run: |
          python3 << 'PYEOF'
          import json, sys, os

          if not os.path.exists("scan-results.json") or os.path.getsize("scan-results.json") == 0:
              print("WARN: scan-results.json is empty — scanner may not have produced JSON output")
              sys.exit(1)

          with open("scan-results.json") as f:
              results = json.load(f)

          # Collect all findings from all domains/controls
          all_findings = []
          for domain in results.get("domains", {}).values():
              for control in domain.get("controls", {}).values():
                  all_findings.extend(control.get("findings", []))

          critical_high = [f for f in all_findings if f.get("severity") in ("critical", "high")]

          print(f"Compliance: {results.get('compliance', {}).get('level_name', 'unknown')}")
          print(f"Risk score: {results.get('risk_score', 'unknown')}")
          print(f"Controls: {results.get('compliance', {}).get('controls_passed', 0)} passed, "
                f"{results.get('compliance', {}).get('controls_failed', 0)} failed")
          print(f"Total findings: {len(all_findings)}")

          if critical_high:
              print(f"\nFAIL: {len(critical_high)} critical/high findings:")
              for f in critical_high:
                  print(f"  [{f['severity'].upper()}] {f.get('id', '')} - {f.get('title', '')}")
                  if f.get("remediation"):
                      print(f"    Fix: {f['remediation']}")
              sys.exit(1)

          print("\nPASS: No critical/high findings")
          PYEOF
