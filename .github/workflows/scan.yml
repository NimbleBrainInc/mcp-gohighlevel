name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: uv sync

      - name: Build bundle
        run: |
          uv pip install --target ./deps --only-binary :all: . 2>/dev/null || uv pip install --target ./deps .
          npx @anthropic-ai/mcpb pack .

      - name: Run MTF scanner
        run: |
          set +e
          uvx mpak-scanner scan *.mcpb --json > scan-results.json 2>scan-stderr.log
          SCAN_EXIT=$?
          echo "Scanner exit code: $SCAN_EXIT"
          echo "--- stderr ---"
          cat scan-stderr.log
          echo "--- stdout (scan-results.json) ---"
          cat scan-results.json
          echo "---"

      - name: Check for critical/high findings
        run: |
          python3 -c "
          import json, sys, os
          if not os.path.exists('scan-results.json') or os.path.getsize('scan-results.json') == 0:
              print('WARN: scan-results.json is empty — scanner may not have produced JSON output')
              print('Check scan-stderr.log for details')
              sys.exit(1)
          with open('scan-results.json') as f:
              results = json.load(f)
          findings = results.get('findings', [])
          critical_high = [f for f in findings if f.get('severity') in ('CRITICAL', 'HIGH')]
          if critical_high:
              print(f'FAIL: {len(critical_high)} critical/high findings')
              for f in critical_high:
                  print(f'  [{f[\"severity\"]}] {f.get(\"control\", \"\")} - {f.get(\"message\", \"\")}')
              sys.exit(1)
          print(f'PASS: No critical/high findings ({len(findings)} total findings)')
          "
